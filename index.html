<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura Cards</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap');

    :root {
      --bg-color: #0f172a;
      --glass-bg: rgba(30, 41, 59, 0.72);
      --glass-border: rgba(255, 255, 255, 0.12);
      --neon-blue: #38bdf8;
      --neon-gold: #facc15;
      --neon-green: #4ade80;
      --neon-red: #f87171;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --card-width: 62px;
      --card-height: 90px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      user-select: none;
    }

    body {
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg-color) 100%);
      color: var(--text-main);
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 22px;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--glass-border);
      z-index: 10;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 1.35rem;
      font-weight: 900;
      color: var(--neon-gold);
      text-shadow: 0 0 12px rgba(250, 204, 21, 0.45);
      letter-spacing: 1px;
    }

    .nav-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .top-pill {
      padding: 8px 12px;
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.55);
      color: var(--text-main);
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .gold-input {
      width: 110px;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid var(--glass-border);
      background: rgba(15, 23, 42, 0.8);
      color: white;
      outline: none;
      font-size: 0.95rem;
    }

    .gold-input:focus {
      border-color: var(--neon-gold);
      box-shadow: 0 0 0 3px rgba(250, 204, 21, 0.15);
    }

    .nav-controls button {
      background: transparent;
      border: 1px solid var(--neon-blue);
      color: var(--neon-blue);
      padding: 9px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.25s ease;
    }

    .nav-controls button:hover {
      background: var(--neon-blue);
      color: var(--bg-color);
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.45);
      transform: translateY(-1px);
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px;
      position: relative;
      gap: 16px;
    }

    .golden-number-container {
      text-align: center;
      padding: 18px 30px;
      background: rgba(250, 204, 21, 0.10);
      border: 2px solid var(--neon-gold);
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(250, 204, 21, 0.16);
      animation: pulse-gold 2s infinite;
      width: min(520px, 100%);
    }

    @keyframes pulse-gold {
      0%, 100% { box-shadow: 0 0 20px rgba(250, 204, 21, 0.18); }
      50% { box-shadow: 0 0 40px rgba(250, 204, 21, 0.52); }
    }

    .golden-number-title {
      font-size: 0.95rem;
      color: var(--neon-gold);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .golden-number {
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 20px var(--neon-gold);
      line-height: 1;
    }

    .players-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      width: 100%;
      max-width: 1180px;
      flex: 1;
      overflow: auto;
      padding-bottom: 10px;
    }

    .player-card {
      background: var(--glass-bg);
      border: 2px solid var(--glass-border);
      border-radius: 18px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      transition: all 0.35s ease;
      position: relative;
      backdrop-filter: blur(6px);
      min-height: 270px;
    }

    .player-card.active {
      border-color: var(--neon-green);
      box-shadow: 0 0 20px rgba(74, 222, 128, 0.35);
      transform: scale(1.02);
      z-index: 4;
    }

    .player-card.settled {
      opacity: 0.72;
      filter: grayscale(0.45);
    }

    .player-card-header {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
      margin-bottom: 12px;
    }

    .player-name {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--neon-blue);
      text-align: center;
    }

    .player-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge {
      font-size: 0.78rem;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.13);
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .badge.active-badge {
      background: rgba(74, 222, 128, 0.16);
      border-color: rgba(74, 222, 128, 0.30);
      color: #dcfce7;
    }

    .badge.target-badge {
      background: rgba(250, 204, 21, 0.14);
      border-color: rgba(250, 204, 21, 0.28);
      color: #fef08a;
    }

    .player-score {
      font-size: 0.92rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 10px;
    }

    .live-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .live-stat {
      background: rgba(15, 23, 42, 0.55);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px 12px;
      min-height: 66px;
    }

    .live-stat .label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .live-stat .value {
      font-size: 1.1rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.15;
    }

    .live-stat .value.good { color: #bbf7d0; }
    .live-stat .value.warn { color: #fde68a; }
    .live-stat .value.bad { color: #fecaca; }

    .cards-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-content: flex-start;
      gap: 0;
      min-height: var(--card-height);
      width: 100%;
      padding-top: 2px;
    }

    .card {
      width: var(--card-width);
      height: var(--card-height);
      background: #fff;
      border-radius: 10px;
      box-shadow: -2px 2px 10px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 1.45rem;
      font-weight: bold;
      margin-left: -16px;
      animation: slideInCard 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      position: relative;
      border: 1px solid rgba(0,0,0,0.08);
    }

    .card:first-child { margin-left: 0; }

    .card.red { color: #dc2626; }
    .card.black { color: #111827; }

    .card .suit {
      font-size: 1rem;
      margin-top: 2px;
    }

    @keyframes slideInCard {
      from { opacity: 0; transform: translateY(-26px) rotate(-10deg) scale(0.75); }
      to { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    }

    .controls-container {
      margin-top: auto;
      padding: 8px 0 4px;
      display: flex;
      gap: 14px;
      justify-content: center;
      width: 100%;
      flex-wrap: wrap;
    }

    .action-btn {
      padding: 14px 34px;
      font-size: 1.05rem;
      font-weight: 800;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.25s;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .btn-hit {
      background: var(--neon-green);
      color: #000;
      box-shadow: 0 0 15px rgba(74, 222, 128, 0.45);
    }

    .btn-hit:hover {
      box-shadow: 0 0 25px rgba(74, 222, 128, 0.75);
      transform: translateY(-2px);
    }

    .btn-stand {
      background: var(--neon-red);
      color: #fff;
      box-shadow: 0 0 15px rgba(248, 113, 113, 0.45);
    }

    .btn-stand:hover {
      box-shadow: 0 0 25px rgba(248, 113, 113, 0.75);
      transform: translateY(-2px);
    }

    .action-btn:disabled {
      background: #475569;
      color: #94a3b8;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      padding: 16px;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-content {
      background: var(--bg-color);
      border: 2px solid var(--neon-blue);
      border-radius: 22px;
      padding: 26px;
      width: min(540px, 100%);
      box-shadow: 0 0 40px rgba(56, 189, 248, 0.18);
      transform: translateY(40px);
      transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-overlay.active .modal-content {
      transform: translateY(0);
    }

    .modal-header {
      font-size: 1.65rem;
      color: var(--neon-blue);
      margin-bottom: 18px;
      text-align: center;
      font-weight: 900;
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 1.7rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.2s;
    }

    .modal-close:hover { color: var(--neon-red); }

    .name-edit-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 18px;
    }

    .name-input {
      width: 100%;
      padding: 11px 14px;
      background: #1e293b;
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
    }

    .name-input:focus {
      border-color: var(--neon-blue);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
    }

    .modal-btn {
      width: 100%;
      padding: 12px 14px;
      background: var(--neon-blue);
      color: var(--bg-color);
      border: none;
      border-radius: 10px;
      font-size: 1.02rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: 10px;
    }

    .modal-btn:hover { filter: brightness(1.05); }

    .leaderboard-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      background: var(--glass-bg);
      margin-bottom: 8px;
      border-radius: 10px;
      border-left: 4px solid var(--text-muted);
    }

    .leaderboard-row:nth-child(1) { border-left-color: var(--neon-gold); }
    .leaderboard-row:nth-child(2) { border-left-color: #cbd5e1; }
    .leaderboard-row:nth-child(3) { border-left-color: #b45309; }

    .score-highlight {
      font-weight: 900;
      color: var(--neon-gold);
      white-space: nowrap;
    }

    .round-note {
      text-align: center;
      margin-bottom: 14px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .round-note strong {
      color: var(--neon-gold);
    }

    @media (max-width: 980px) {
      .players-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px) {
      body { overflow: auto; }
      .players-grid {
        grid-template-columns: 1fr;
      }
      .nav-controls {
        justify-content: flex-start;
      }
      .gold-input {
        width: 100%;
        max-width: 160px;
      }
      .live-panel {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">AURA CARDS</div>

    <div class="nav-controls">
      <span class="top-pill" id="round-indicator">Round: 1</span>
      <span class="top-pill" id="turn-indicator">Turn: Player 1</span>

      <input
        type="number"
        id="golden-input"
        class="gold-input"
        min="1"
        max="999"
        placeholder="Golden #"
      />
      <button onclick="applyGoldenNumber()">Set Golden</button>

      <button onclick="openModal('modal-names')">Edit Players</button>
      <button onclick="openModal('modal-leaderboard')">Leaderboard</button>
      <button onclick="openModal('modal-pause')">Menu</button>
    </div>
  </header>

  <main>
    <div class="golden-number-container">
      <div class="golden-number-title">Golden Number</div>
      <div class="golden-number" id="golden-number">--</div>
    </div>

    <div class="players-grid" id="players-grid"></div>

    <div class="controls-container">
      <button class="action-btn btn-hit" id="btn-hit" onclick="drawCard()">Draw Card</button>
      <button class="action-btn btn-stand" id="btn-stand" onclick="settlePlayer()">Settle</button>
    </div>
  </main>

  <!-- Edit Names Modal -->
  <div id="modal-names" class="modal-overlay">
    <div class="modal-content">
      <span class="modal-close" onclick="closeModal('modal-names')">&times;</span>
      <div class="modal-header">Edit Players</div>
      <div class="name-edit-group" id="name-inputs-container"></div>
      <button class="modal-btn" onclick="saveNames()">Save Names</button>
    </div>
  </div>

  <!-- Leaderboard Modal -->
  <div id="modal-leaderboard" class="modal-overlay">
    <div class="modal-content">
      <span class="modal-close" onclick="closeModal('modal-leaderboard')">&times;</span>
      <div class="modal-header">Session Leaderboard</div>
      <div id="leaderboard-container"></div>
    </div>
  </div>

  <!-- Round End Modal -->
  <div id="modal-round-end" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">Round Over</div>
      <div id="round-summary-container"></div>
      <div style="display:flex; gap:10px; margin-top:18px; flex-wrap: wrap;">
        <button class="modal-btn" onclick="startNextRound()" style="background: var(--neon-green)">Next Round</button>
        <button class="modal-btn" onclick="endSession()" style="background: var(--neon-red)">End Session</button>
      </div>
    </div>
  </div>

  <!-- Pause Modal -->
  <div id="modal-pause" class="modal-overlay">
    <div class="modal-content">
      <span class="modal-close" onclick="closeModal('modal-pause')">&times;</span>
      <div class="modal-header">Game Menu</div>
      <button class="modal-btn" onclick="closeModal('modal-pause')">Resume Game</button>
      <button class="modal-btn" onclick="hardRestart()" style="background: var(--neon-red); margin-top:15px;">Restart Session</button>
    </div>
  </div>

  <script>
    const suits = ['♠', '♥', '♦', '♣'];

    let gameState = {
      round: 1,
      goldenNumber: 0,
      activePlayerIndex: 0,
      players: [],
      isSessionEnded: false
    };

    function initPlayers() {
      gameState.players = [];
      for (let i = 0; i < 6; i++) {
        gameState.players.push({
          id: i,
          name: `Player ${i + 1}`,
          cards: [],
          sum: 0,
          roundPoints: 0,
          totalPoints: 0,
          settled: false
        });
      }
    }

    function getRandomCard() {
      // Modify generator to select values from 1 up to 13
      const value = Math.floor(Math.random() * 13) + 1;
      const suit = suits[Math.floor(Math.random() * suits.length)];
      const isRed = suit === '♥' || suit === '♦';
      
      let displayValue;
      if (value === 1) displayValue = 'A';
      else if (value === 11) displayValue = 'J';
      else if (value === 12) displayValue = 'Q';
      else if (value === 13) displayValue = 'K';
      else displayValue = String(value);

      return { value, displayValue, suit, isRed };
    }

    function applyGoldenNumber() {
      const input = document.getElementById('golden-input');
      const val = parseInt(input.value, 10);

      if (Number.isNaN(val) || val < 1) {
        gameState.goldenNumber = Math.floor(Math.random() * 22) + 21;
        input.value = gameState.goldenNumber;
      } else {
        gameState.goldenNumber = val;
      }

      updateUI();
    }

    function startRound() {
      if (!gameState.goldenNumber || gameState.goldenNumber < 1) {
        gameState.goldenNumber = Math.floor(Math.random() * 22) + 21;
        document.getElementById('golden-input').value = gameState.goldenNumber;
      }

      gameState.activePlayerIndex = 0;

      gameState.players.forEach(p => {
        p.cards = [];
        p.sum = 0;
        p.roundPoints = 0;
        p.settled = false;
        p.cards.push(getRandomCard());
      });

      document.getElementById('round-indicator').innerText = `Round: ${gameState.round}`;
      updateUI();
    }

    function drawCard() {
      if (gameState.isSessionEnded) return;
      if (gameState.activePlayerIndex >= gameState.players.length) return;

      const player = gameState.players[gameState.activePlayerIndex];
      if (player.settled) return;

      player.cards.push(getRandomCard());
      updateUI();
    }

    function settlePlayer() {
      if (gameState.isSessionEnded) return;
      if (gameState.activePlayerIndex >= gameState.players.length) return;

      gameState.players[gameState.activePlayerIndex].settled = true;
      gameState.activePlayerIndex++;

      if (gameState.activePlayerIndex >= gameState.players.length) {
        calculateRoundPoints();
      } else {
        updateUI();
      }
    }

    function calculateRoundPoints() {
      gameState.players.forEach(p => {
        p.sum = p.cards.reduce((acc, card) => acc + card.value, 0);
        const diff = Math.abs(gameState.goldenNumber - p.sum);

        if (diff > 10) {
          p.roundPoints = 0;
        } else {
          p.roundPoints = 10 - diff;
        }

        p.totalPoints += p.roundPoints;
      });

      showRoundEndSummary();
    }

    function startNextRound() {
      closeModal('modal-round-end');
      gameState.round++;
      startRound();
    }

    function endSession() {
      closeModal('modal-round-end');
      gameState.isSessionEnded = true;
      populateLeaderboard();
      openModal('modal-leaderboard');
    }

    function hardRestart() {
      closeModal('modal-pause');
      closeModal('modal-leaderboard');
      closeModal('modal-round-end');

      gameState.round = 1;
      gameState.isSessionEnded = false;
      initPlayers();

      const input = document.getElementById('golden-input');
      input.value = Math.floor(Math.random() * 22) + 21;
      applyGoldenNumber();
      startRound();
    }

    function getDeviationText(sum) {
      const diff = Math.abs(gameState.goldenNumber - sum);
      if (sum === gameState.goldenNumber) return { text: `Perfect match`, cls: 'good' };
      if (sum < gameState.goldenNumber) return { text: `-${diff} below target`, cls: 'warn' };
      return { text: `+${diff} above target`, cls: 'bad' };
    }

    function updateUI() {
      document.getElementById('golden-number').innerText = gameState.goldenNumber || '--';
      document.getElementById('turn-indicator').innerText =
        gameState.isSessionEnded || gameState.activePlayerIndex >= gameState.players.length
          ? 'Turn: Finished'
          : `Turn: ${gameState.players[gameState.activePlayerIndex].name}`;

      const grid = document.getElementById('players-grid');
      grid.innerHTML = '';

      gameState.players.forEach((p, index) => {
        const isActive = index === gameState.activePlayerIndex && !gameState.isSessionEnded;
        const isSettled = p.settled;
        const currentSum = p.cards.reduce((acc, card) => acc + card.value, 0);
        const deviation = Math.abs((gameState.goldenNumber || 0) - currentSum);
        const deviationInfo = getDeviationText(currentSum);

        const cardsHTML = p.cards.map(c => `
          <div class="card ${c.isRed ? 'red' : 'black'}">
            <div>${c.displayValue}</div>
            <div class="suit">${c.suit}</div>
          </div>
        `).join('');

        grid.innerHTML += `
          <div class="player-card ${isActive ? 'active' : ''} ${isSettled ? 'settled' : ''}">
            <div class="player-card-header">
              <div class="player-name">${p.name}</div>
              <div class="player-badges">
                ${isActive ? '<span class="badge active-badge">ACTIVE PLAYER</span>' : ''}
                <span class="badge target-badge">Target: ${gameState.goldenNumber || '--'}</span>
              </div>
            </div>

            <div class="player-score">
              Total Points: <strong style="color: var(--neon-gold);">${p.totalPoints}</strong>
            </div>

            <div class="live-panel">
              <div class="live-stat">
                <div class="label">Mini Total</div>
                <div class="value">${currentSum}</div>
              </div>
              <div class="live-stat">
                <div class="label">Deviation Now</div>
                <div class="value ${deviationInfo.cls}">${gameState.goldenNumber ? deviation : '--'}</div>
              </div>
              <div class="live-stat">
                <div class="label">Status</div>
                <div class="value ${deviationInfo.cls}">${gameState.goldenNumber ? deviationInfo.text : '--'}</div>
              </div>
              <div class="live-stat">
                <div class="label">Cards</div>
                <div class="value">${p.cards.length}</div>
              </div>
            </div>

            <div class="cards-container">
              ${cardsHTML}
            </div>
          </div>
        `;
      });

      const hitBtn = document.getElementById('btn-hit');
      const standBtn = document.getElementById('btn-stand');

      if (gameState.activePlayerIndex >= gameState.players.length || gameState.isSessionEnded) {
        hitBtn.disabled = true;
        standBtn.disabled = true;
      } else {
        hitBtn.disabled = false;
        standBtn.disabled = false;
      }
    }

    function openModal(id) {
      if (id === 'modal-names') populateNameInputs();
      if (id === 'modal-leaderboard') populateLeaderboard();
      document.getElementById(id).classList.add('active');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
    }

    function populateNameInputs() {
      const container = document.getElementById('name-inputs-container');
      container.innerHTML = '';
      gameState.players.forEach((p, i) => {
        container.innerHTML += `
          <input type="text" class="name-input" id="edit-name-${i}" value="${p.name}" placeholder="Player ${i + 1}">
        `;
      });
    }

    function saveNames() {
      gameState.players.forEach((p, i) => {
        const inputVal = document.getElementById(`edit-name-${i}`).value;
        if (inputVal.trim() !== '') p.name = inputVal.trim();
      });
      closeModal('modal-names');
      updateUI();
    }

    function populateLeaderboard() {
      const container = document.getElementById('leaderboard-container');
      const sortedPlayers = [...gameState.players].sort((a, b) => b.totalPoints - a.totalPoints);

      let html = '';
      sortedPlayers.forEach((p, index) => {
        html += `
          <div class="leaderboard-row">
            <div><strong>#${index + 1}</strong> &nbsp; ${p.name}</div>
            <div class="score-highlight">${p.totalPoints} pts</div>
          </div>
        `;
      });

      if (gameState.isSessionEnded) {
        html += `<button class="modal-btn" onclick="hardRestart()" style="margin-top:20px;">Play New Game</button>`;
      }

      container.innerHTML = html;
    }

    function showRoundEndSummary() {
      const container = document.getElementById('round-summary-container');
      let html = `
        <p class="round-note">
          Golden Number was: <strong>${gameState.goldenNumber}</strong><br>
          Final scoring is based on each player’s distance from the target.
        </p>
      `;

      gameState.players.forEach(p => {
        const diff = Math.abs(gameState.goldenNumber - p.sum);
        html += `
          <div class="leaderboard-row" style="border-left-color: var(--neon-blue);">
            <div>${p.name} (Sum: ${p.sum})</div>
            <div>Diff: ${diff} → <span class="score-highlight">+${p.roundPoints}</span></div>
          </div>
        `;
      });

      container.innerHTML = html;
      openModal('modal-round-end');
      updateUI();
    }

    document.getElementById('golden-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') applyGoldenNumber();
    });

    window.onload = () => {
      initPlayers();
      document.getElementById('golden-input').value = Math.floor(Math.random() * 22) + 21;
      applyGoldenNumber();
      startRound();
    };
  </script>
</body>
</html>
